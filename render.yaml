services:
  - type: web
    name: mealy-api
    runtime: docker
    # Build context must be the repo root so the Dockerfile can COPY
    # workspace packages (apps/scraper, packages/types, etc.)
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    region: frankfurt
    plan: starter
    healthCheckPath: /api/health

    envVars:
      # ── Runtime ───────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '3001'

      # ── Database & cache ──────────────────────────────────────────────────
      # Set these to your Neon and Upstash connection strings in the dashboard
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false

      # ── Auth ─────────────────────────────────────────────────────────────
      # Must match AUTH_SECRET set in your Vercel/web deployment
      - key: AUTH_SECRET
        sync: false

      # ── Optional: protect internal OAuth upsert endpoint ──────────────────
      - key: INTERNAL_API_KEY
        sync: false

      # ── CORS ──────────────────────────────────────────────────────────────
      # Set to your Vercel deployment URL, e.g. https://mealy.vercel.app
      - key: FRONTEND_URL
        sync: false

      # ── Scraper ───────────────────────────────────────────────────────────
      - key: SCRAPER_API_KEY
        sync: false
